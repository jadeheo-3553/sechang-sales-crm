<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 마스터 — 디자인세창</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0d0f14;--surface:#1a1e2a;--surface2:#222736;--border:#3a4260;--accent:#00d4ff;--text:#f0f4ff;--text2:#b0bcdb;--text3:#7a8ab0;--red:#ff5577;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
#loginWrap{width:100%;max-width:420px;padding:24px;}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:52px 44px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.llogo{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:3px;text-align:center;margin-bottom:6px;}
.llogo em{color:var(--text3);font-style:normal;}
.lco{text-align:center;font-size:13px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:44px;letter-spacing:1px;}
.llabel{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:block;}
.linput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;margin-bottom:18px;}
.linput:focus{border-color:var(--accent);}
.linput::placeholder{color:var(--text3);}
.lbtn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.lbtn:hover{opacity:.88;}
.lbtn:disabled{opacity:.5;cursor:not-allowed;}
.lerr{background:rgba(255,85,119,.12);border:1px solid rgba(255,85,119,.3);color:var(--red);border-radius:8px;padding:11px 16px;font-size:14px;margin-top:16px;display:none;line-height:1.6;white-space:pre-line;}
.lmsg{text-align:center;color:var(--text3);font-size:14px;margin-top:16px;display:none;font-family:'IBM Plex Mono',monospace;}
.lfooter{text-align:center;font-size:12px;color:var(--text3);margin-top:32px;line-height:1.8;}
#loadingOv{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
#loadingOv.show{display:flex;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--text2);}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="lcard">
    <div class="llogo">SALES<em>/</em>MASTER</div>
    <div class="lco">디자인세창 영업 분석 시스템</div>
    <label class="llabel" for="uid">아이디</label>
    <input class="linput" type="text" id="uid" placeholder="아이디 입력" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false">
    <label class="llabel" for="pw">비밀번호</label>
    <input class="linput" type="password" id="pw" placeholder="비밀번호 입력" autocomplete="current-password">
    <button class="lbtn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="lerr" id="errMsg"></div>
    <div class="lmsg" id="loadingMsg">⟳ 인증 중...</div>
    <div class="lfooter">접속 문의: 관리자에게 연락하세요</div>
  </div>
</div>
<div id="loadingOv">
  <div class="spinner"></div>
  <div class="ltxt" id="loadingTxt">앱 로딩 중...</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzIrBAeI5L40e-HHglmhiKo5cGUdIaAWPIYXIl3mCngeLZaeb4Nrg-YLC4-PUI0X9R/exec';
const SK = 'sm_v4_sess';

window.addEventListener('load', async function() {
  var saved = getSession();
  if (saved) {
    showOv('세션 확인 중...');
    try {
      var res = await fetchGet('check', saved.token);
      if (res.ok) { await loadApp(saved); return; }
    } catch(e) {}
    clearSession();
    hideOv();
  }
});

async function doLogin() {
  var uid = document.getElementById('uid').value.trim();
  var pw  = document.getElementById('pw').value;
  if (!uid || !pw) { showErr('아이디와 비밀번호를 입력하세요.'); return; }
  setBusy(true);
  try {
    var res = await fetchPost({action:'login', username:uid, password:pw});
    if (res.ok) { saveSession(res); await loadApp(res); }
    else showErr(res.error || '로그인 실패');
  } catch(e) { showErr('서버 연결 오류: ' + e.message); }
  setBusy(false);
}

async function loadApp(session) {
  showOv('앱 불러오는 중...');
  try {
    var url = SCRIPT_URL + '?action=app&token=' + encodeURIComponent(session.token);
    var resp = await fetch(url);
    var json = await resp.json();
    if (!json.ok || !json.htmlB64) throw new Error(json.error || '앱 로드 실패');

    // base64 → UTF-8 디코딩
    var bytes = Uint8Array.from(atob(json.htmlB64), function(c){return c.charCodeAt(0);});
    var htmlText = new TextDecoder('utf-8').decode(bytes);

    // 세션 정보 스크립트 삽입
    var sessJson = JSON.stringify({
      username: session.username,
      name: session.name,
      isAdmin: session.isAdmin,
      token: session.token,
      scriptUrl: SCRIPT_URL
    });
    var sessScript = '<scr'+'ipt>window.__SESSION__='+sessJson+';</scr'+'ipt>';
    htmlText = htmlText.replace('</head>', sessScript + '</head>');

    // ★ Blob URL 방식으로 새 탭 대신 현재 탭에서 교체
    var blob = new Blob([htmlText], {type:'text/html;charset=utf-8'});
    var blobUrl = URL.createObjectURL(blob);

    // 현재 페이지를 blob URL로 교체 (history 유지)
    window.location.href = blobUrl;

  } catch(e) {
    hideOv();
    clearSession();
    showErr('앱 로드 오류: ' + e.message);
  }
}

async function fetchGet(action, token) {
  var r = await fetch(SCRIPT_URL + '?action=' + action + '&token=' + encodeURIComponent(token));
  return r.json();
}
async function fetchPost(body) {
  var r = await fetch(SCRIPT_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body)});
  return r.json();
}
function showErr(msg) {
  var el=document.getElementById('errMsg'); if(el){el.textContent=msg;el.style.display='block';}
  var lm=document.getElementById('loadingMsg'); if(lm)lm.style.display='none';
}
function setBusy(b) {
  var btn=document.getElementById('loginBtn'); if(btn)btn.disabled=b;
  var lm=document.getElementById('loadingMsg'); if(lm)lm.style.display=b?'block':'none';
  var em=document.getElementById('errMsg'); if(em&&b)em.style.display='none';
}
function showOv(msg) {
  var el=document.getElementById('loadingTxt'); if(el)el.textContent=msg;
  var ov=document.getElementById('loadingOv'); if(ov)ov.classList.add('show');
}
function hideOv() { var ov=document.getElementById('loadingOv'); if(ov)ov.classList.remove('show'); }
function saveSession(d) { sessionStorage.setItem(SK, JSON.stringify({token:d.token,username:d.username,name:d.name,isAdmin:d.isAdmin,expiry:d.expiry})); }
function getSession() {
  try {
    var s=JSON.parse(sessionStorage.getItem(SK));
    if(!s||!s.token) return null;
    if(s.expiry && new Date().getTime()>s.expiry){clearSession();return null;}
    return s;
  } catch(e){return null;}
}
function clearSession() { sessionStorage.removeItem(SK); }
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
